services:
  # Backend Web Service
  - type: web
    name: hrms-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # You will need to provide this in the Render dashboard
        
  # Frontend Static Site
  - type: web
    name: hrms-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # Update this to your backend URL once Render provisions it
        value: https://hrms-backend.onrender.com
